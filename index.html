<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Survey Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="title">
            <h1>AI Survey Form</h1>
            <p>
                This survey helps us understand how people use AI tools 
                in their everyday lives.</p>
        </div>

        <form id="ai-survey">

            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="user_name"  placeholder="(optional)" >
            </div>

            <div class="form-group">
                <label for="age-group">Age Group</label>
                <select id="age-group" name="age_group" required>
                    <option value="">-- Select your age --</option>
                    <option value="under-18">Under 18</option>
                    <option value="18-29">18 - 29</option>
                    <option value="30-49">30 - 49</option>
                    <option value="50-plus">50+</option>
                </select>
            </div>

            <div class="form-group">
                <label> How often do you use AI tools? </label>
                <label class="option">
                    <input type="radio" name="ai_usage" value="daily" required > Daily
                </label>
                <label class="option">
                    <input type="radio" name="ai_usage" value="weekly">Weekly</label>
                <label class="option">
                    <input type="radio" name="ai_usage" value="rarely" >  Rarely / Never </label>
            </div>
            <div class="form-group">
                <label> Which AI areas interest or concern you? </label>
                <label class="option">
                    <input type="checkbox" name="interests" value="productivity">Work Productivity
                </label>
                <label class="option">
                    <input  type="checkbox"  name="interests"  value="art"> Creative Art & Writing
                </label>

                <label class="option">
                    <input type="checkbox"  name="interests"  value="privacy" > Privacy & Data Security
                </label>
                <label class="option">
                    <input type="checkbox" name="interests" value="jobs" > Future of Jobs
                </label>
            </div>
            <div class="form-group">
                <label for="comments">
                    What is your biggest hope or fear regarding AI?
                </label>
                <textarea  id="comments" name="user_comments" rows="4"  placeholder="Write your thoughts here..." ></textarea>
            </div>

            <button type="submit">
                Submit Survey
            </button>
        </form>
        <div id="success-message">
            🎉 Thank you! Your survey response was submitted successfully.
        </div>
    </div>
    <script src="javascript.js">
    </script>
</body>
</html>
